name: Build and Deploy Data Dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos (limite minimo do Github Actions)

# Permissões necessárias para publicar no GitHub Pages usando Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo para o GitHub Pages
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data collection script
        run: python collect-data.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz o upload apenas da pasta dashboard
          path: './dashboard'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
